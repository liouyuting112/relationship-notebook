<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>求生聯絡簿 📒 | 終極群組版</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --pink: #FF6B8B;
            --bg: #FAFAFA;
            --border: #E5E5E5;
            --card: #FFFFFF;
            --text: #333;
            --pin: #FFB300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 歡迎首頁 */
        .welcome-view {
            text-align: center;
            max-width: 400px;
            padding: 50px 20px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-top: 50px;
        }

        .welcome-view h1 {
            color: var(--pink);
            margin-bottom: 20px;
        }

        .btn-main {
            background: var(--pink);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 107, 139, 0.3);
            margin-top: 10px;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        /* 主應用區 */
        .app-container {
            display: none;
            width: 100%;
            max-width: 800px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            min-height: 80vh;
            position: relative;
            border: 1px solid var(--border);
        }

        /* 頂部導航列 (群組切換) */
        .top-nav {
            background: #333;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-selector {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            font-weight: bold;
            max-width: 150px;
        }

        .top-nav-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-small {
            background: #555;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-small:hover {
            background: #777;
        }

        /* 內容標頭 */
        .header {
            background: #FFF9FA;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            color: var(--pink);
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background: #FF9800;
            border-radius: 50%;
            display: inline-block;
        }

        /* 搜尋列 */
        .search-box {
            display: flex;
            width: 100%;
            background: #FFF;
            border: 1px solid #DDD;
            border-radius: 12px;
            padding: 5px 15px;
            align-items: center;
        }

        .search-box input {
            border: none;
            outline: none;
            padding: 8px 0;
            width: 100%;
            font-size: 14px;
        }

        .search-box span {
            color: #AAA;
        }

        /* 身分認證畫面 */
        .identity-view {
            display: none;
            padding: 40px;
            text-align: center;
            flex-direction: column;
            align-items: center;
        }

        .id-btn {
            background: #FFF0F3;
            color: #A03B52;
            border: 1px solid #FFE0E6;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            font-size: 16px;
            width: 100%;
            max-width: 300px;
        }

        .id-btn:hover {
            background: var(--pink);
            color: #FFF;
        }

        /* 筆記本主畫面 */
        .notebook-view {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .search-results-title {
            padding: 10px 20px;
            color: #888;
            font-size: 14px;
            border-bottom: 1px solid #EEE;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .result-item .meta {
            font-size: 11px;
            color: var(--pink);
            font-weight: bold;
            opacity: 0.8;
        }

        .result-item .path {
            color: #888;
            margin-right: 5px;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            background: #FAFAFA;
            border-bottom: 1px solid var(--border);
            gap: 10px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: #FFF;
            border: 1px solid #DDD;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--pink);
            color: #FFF;
            border-color: var(--pink);
        }

        .content-area {
            padding: 20px;
            background: var(--bg);
            flex: 1;
        }

        /* 個人釘選摘要卡 */
        .pinned-summary {
            background: linear-gradient(135deg, #FFF9E6, #FFF5D6);
            border: 2px solid var(--pin);
            border-radius: 14px;
            padding: 15px 18px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(255, 179, 0, 0.12);
        }

        .pinned-summary h4 {
            color: #B37D00;
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(179, 125, 0, 0.15);
            padding-bottom: 8px;
        }

        .pinned-summary-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 6px 0;
            font-size: 14px;
            color: #555;
            border-bottom: 1px dotted #F0E0B0;
        }

        .pinned-summary-row:last-child {
            border-bottom: none;
        }

        .pinned-summary-row .cat-label {
            font-weight: bold;
            color: #8B6B00;
            white-space: nowrap;
        }

        .pinned-summary-row .cat-items {
            color: #555;
        }

        /* 共同 Tab 樣式 */
        .tab-btn.shared-tab {
            background: linear-gradient(135deg, #FFF8E1, #FFE082);
            border: 2px solid #FFB300;
            color: #8D6E00;
        }

        .tab-btn.shared-tab.active {
            background: linear-gradient(135deg, #FFB300, #FF8F00);
            color: white;
            border-color: #FF8F00;
            box-shadow: 0 3px 12px rgba(255, 143, 0, 0.3);
        }

        .shared-header-banner {
            background: linear-gradient(135deg, #FFF8E1, #FFECB3);
            border: 1px solid #FFD54F;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 15px;
            text-align: center;
            color: #8D6E00;
            font-size: 14px;
        }

        /* 我的 Tab 加強 */
        .tab-btn.is-me {
            border: 2.5px solid var(--pink);
            color: var(--pink);
            position: relative;
            font-weight: 800;
        }

        .tab-btn.is-me::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: var(--pink);
            border-radius: 50%;
        }

        .tab-btn.is-me.active {
            background: linear-gradient(135deg, #FF6B8B, #FF4B6B);
            color: white;
            border-color: #FF4B6B;
            box-shadow: 0 3px 12px rgba(255, 107, 139, 0.3);
        }

        .tab-btn.is-me.active::after {
            background: white;
        }

        /* 瀑布流排版 (解決過長問題) */
        .masonry {
            column-count: 1;
            column-gap: 20px;
        }

        @media (min-width: 600px) {
            .masonry {
                column-count: 2;
            }
        }

        .category-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            background: var(--card);
            break-inside: avoid;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #E5E5E5;
            padding-bottom: 10px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .category-header h3 {
            font-size: 16px;
            color: #444;
        }

        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .item-tag {
            background: #F5F5F7;
            color: #444;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #E5E5E5;
            transition: 0.2s;
        }

        .item-tag.pinned {
            border: 1px solid var(--pin);
            background: #FFF9E6;
            color: #B37D00;
            font-weight: bold;
        }

        /* 亮點搜尋關鍵字 */
        .highlight {
            background: yellow;
            color: #000;
        }

        .tag-actions {
            display: flex;
            opacity: 0.5;
            gap: 5px;
        }

        .item-tag:hover .tag-actions {
            opacity: 1;
        }

        .action-btn {
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn:hover {
            transform: scale(1.2);
        }

        .add-box {
            display: flex;
            gap: 5px;
        }

        .add-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #DDD;
            border-radius: 8px;
            outline: none;
            font-size: 13px;
        }

        .add-box button {
            background: #E5E5E5;
            border: none;
            padding: 0 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 16px;
            outline: none;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- 首頁：無群組時顯示 -->
    <div class="welcome-view" id="welcomeView">
        <h1>📒 求生群組小本本</h1>
        <p>可以建立無限多個群組 (家人/朋友/情侶)。<br>每個群組網址獨立，你能在上方清單隨時切換，但你分享網址給朋友時，他們只看得到該群組！</p>
        <button class="btn-main" onclick="openCreateGroupModal()">➕ 建立我的第一個群組</button>
    </div>

    <!-- 主應用區 -->
    <div class="app-container" id="appView">

        <!-- 全局頂部：群組管理 -->
        <div class="top-nav">
            <div>
                <select class="group-selector" id="groupSelector" onchange="switchRoom(this.value)"></select>
            </div>
            <div class="top-nav-right">
                <button class="btn-small" onclick="openCreateGroupModal()">+ 開新群組</button>
                <button class="btn-small" style="background:#4CAF50;" onclick="shareRoom()">🔗 給這群別人</button>
            </div>
        </div>

        <!-- 房間內容 -->
        <div class="header">
            <div class="header-top">
                <h2 id="roomTitle"><span class="sync-dot" id="syncDot"></span> <span id="roomNameLabel">載入中...</span>
                </h2>
                <div style="font-size: 12px; color: #888;">本群限制長度：無限</div>
            </div>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="模糊搜尋：例如打『花生』或『鞋』..." onkeyup="handleSearch()">
            </div>
        </div>

        <!-- 身分認證層 (如果在此房間沒身分) -->
        <div class="identity-view" id="identityView">
            <h3 style="margin-bottom:20px; color:var(--pink);">這個群組裡，你是哪位？</h3>
            <div id="existingProfiles"
                style="width: 100%; display: flex; flex-direction: column; gap: 10px; align-items:center;"></div>
            <div style="margin:20px 0; color:#AAA; font-size:14px;">或</div>
            <input type="text" id="newIdentityName" placeholder="我是... (例如: 老爸)"
                style="padding:12px; border:1px solid #CCC; border-radius:10px; text-align:center; width: 100%; max-width:300px; margin-bottom:10px;">
            <button class="btn-main" style="max-width:300px;" onclick="createNewIdentity()">＋ 建立我的身分</button>
        </div>

        <!-- 筆記本操作層 -->
        <div class="notebook-view" id="notebookView" style="display:none;">
            <div class="tabs" id="tabsArea"></div>
            <div class="content-area">
                <div id="contentArea"></div>
                <div id="actionButtons"></div>
            </div>
        </div>
    </div>

    <!-- 通用輸入 Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">輸入</h3>
            <input type="text" id="modalInput" placeholder="...">
            <div class="modal-btns">
                <button style="background:#EEE; color:#555;" onclick="closeModal()">取消</button>
                <button style="background:var(--pink); color:white;" id="modalConfirm">確定</button>
            </div>
        </div>
    </div>

    <script>
        // MQTT & 系統變數
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
        let client = null;
        let myClientID = 'client_' + Math.random().toString(16).substr(2, 8);

        // 多群組管理
        let savedRooms = JSON.parse(localStorage.getItem('my_saved_rooms_v5') || '[]');
        let currentRoomId = new URLSearchParams(window.location.search).get('room');

        // 當前房間資料
        let localData = { name: "未命名群組", updatedAt: 0, profiles: [], shared: null };
        let activeProfileIndex = 0; // -1 = 共同 tab
        let myProfileId = null;
        let searchQuery = "";

        function ensureSharedData() {
            if (!localData.shared) {
                localData.shared = {
                    categories: [
                        { id: 'sc_1', name: '🎉 紀念日', items: [] },
                        { id: 'sc_2', name: '❤️ 共同喜好', items: [] },
                        { id: 'sc_3', name: '📋 共同備註', items: [] }
                    ]
                };
            }
        }

        function initApp() {
            if (!currentRoomId) {
                if (savedRooms.length > 0) {
                    // 如果沒帶網址但有存過，跳轉到最後一個
                    window.location.href = '?room=' + savedRooms[0].id;
                } else {
                    document.getElementById('welcomeView').style.display = 'block';
                }
                return;
            }

            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('appView').style.display = 'block';

            myProfileId = sessionStorage.getItem('my_id_for_' + currentRoomId);

            // 如果這是新連到的網址，把它存進我的房間清單 (預設名稱)
            if (!savedRooms.find(r => r.id === currentRoomId)) {
                savedRooms.unshift({ id: currentRoomId, name: "載入中群組..." });
                saveRoomsList();
            }

            renderRoomSelector();
            initMqttSync();
        }

        /* 群組切換與建立 */
        function saveRoomsList() {
            localStorage.setItem('my_saved_rooms_v5', JSON.stringify(savedRooms));
        }

        function renderRoomSelector() {
            const sel = document.getElementById('groupSelector');
            sel.innerHTML = '';
            savedRooms.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = r.name || "未命名群組";
                if (r.id === currentRoomId) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function switchRoom(roomId) {
            if (roomId) window.location.href = '?room=' + roomId;
        }

        let modalAction = '';
        function openCreateGroupModal() {
            openModal("🏠 建立新群組", "請輸入群組名稱 (例如：家人群組)", "create_room");
        }

        /* MQTT 核心 */
        function initMqttSync() {
            const backup = localStorage.getItem('r_data_' + currentRoomId);
            if (backup) {
                localData = JSON.parse(backup);
                updateRoomNameInList(localData.name);
            }

            const topicSync = 'note_v5_' + currentRoomId;
            const topicReq = 'note_req_v5_' + currentRoomId;

            document.getElementById('syncDot').style.background = '#FF9800';

            client = mqtt.connect(brokerUrl, {
                clientId: myClientID, clean: true, connectTimeout: 4000
            });

            client.on('connect', () => {
                document.getElementById('syncDot').style.background = '#4CAF50';
                client.subscribe(topicSync);
                client.subscribe(topicReq);
                client.publish(topicReq, "give_me_data");
            });

            client.on('message', (topic, message) => {
                if (topic === topicReq && message.toString() === "give_me_data" && localData.updatedAt > 0) {
                    client.publish(topicSync, JSON.stringify({ sender: myClientID, data: localData }));
                } else if (topic === topicSync) {
                    try {
                        const payload = JSON.parse(message.toString());
                        if (payload.sender === myClientID) return;
                        const serverData = payload.data;
                        if (serverData.updatedAt > localData.updatedAt) {
                            localData = serverData;
                            localStorage.setItem('r_data_' + currentRoomId, JSON.stringify(localData));
                            updateRoomNameInList(localData.name);
                            verifyIdentityState();
                            triggerSyncAnim();
                        }
                    } catch (e) { }
                }
            });

            setTimeout(verifyIdentityState, 800);
        }

        function pushSync() {
            localData.updatedAt = Date.now();
            localStorage.setItem('r_data_' + currentRoomId, JSON.stringify(localData));
            if (client && client.connected) {
                client.publish('note_v5_' + currentRoomId, JSON.stringify({ sender: myClientID, data: localData }), { retain: true });
                triggerSyncAnim();
            }
            verifyIdentityState();
        }

        function updateRoomNameInList(name) {
            document.getElementById('roomNameLabel').textContent = name;
            let r = savedRooms.find(r => r.id === currentRoomId);
            if (r && r.name !== name) {
                r.name = name;
                saveRoomsList();
                renderRoomSelector();
            }
        }

        function triggerSyncAnim() {
            const d = document.getElementById('syncDot');
            d.style.background = '#2196F3';
            setTimeout(() => d.style.background = '#4CAF50', 500);
        }

        /* 身分與認證 */
        function verifyIdentityState() {
            if (!myProfileId || !localData.profiles.find(p => p.id === myProfileId)) {
                document.getElementById('identityView').style.display = 'flex';
                document.getElementById('notebookView').style.display = 'none';

                const cont = document.getElementById('existingProfiles');
                cont.innerHTML = '';
                localData.profiles.forEach(p => {
                    const b = document.createElement('button');
                    b.className = 'id-btn';
                    b.textContent = "我是 " + p.name;
                    b.onclick = () => selectIdentity(p.id);
                    cont.appendChild(b);
                });
            } else {
                document.getElementById('identityView').style.display = 'none';
                document.getElementById('notebookView').style.display = 'flex';

                if (activeProfileIndex >= localData.profiles.length) activeProfileIndex = 0;
                renderNotebook();
            }
        }

        function selectIdentity(pid) {
            myProfileId = pid;
            sessionStorage.setItem('my_id_for_' + currentRoomId, pid);
            activeProfileIndex = localData.profiles.findIndex(p => p.id === pid);
            verifyIdentityState();
        }

        function createNewIdentity() {
            const name = document.getElementById('newIdentityName').value.trim();
            if (!name) return;
            const pid = 'p_' + Date.now();
            localData.profiles.push({
                id: pid, name: name, categories: [
                    { id: 'c_1', name: '❤️ 喜歡的東西', items: [] },
                    { id: 'c_2', name: '⚠️ 絕對地雷', items: [] }
                ]
            });
            pushSync();
            selectIdentity(pid);
        }

        function shareRoom() {
            navigator.clipboard.writeText(window.location.href);
            alert('🔗 已複製本群組專屬連結！\n任何人打開都只看得到這個群組的資料。');
        }

        /* 筆記本繪製 */
        function renderNotebook() {
            ensureSharedData();
            const tArea = document.getElementById('tabsArea');
            tArea.innerHTML = '';

            // 🌟 共同 Tab
            const sharedBtn = document.createElement('button');
            sharedBtn.className = 'tab-btn shared-tab' + (activeProfileIndex === -1 ? ' active' : '');
            sharedBtn.textContent = '🌟 共同';
            sharedBtn.onclick = () => { activeProfileIndex = -1; renderNotebook(); };
            tArea.appendChild(sharedBtn);

            // 個人 Tabs
            localData.profiles.forEach((p, idx) => {
                const btn = document.createElement('button');
                const isMe = (p.id === myProfileId);
                btn.className = 'tab-btn' + (idx === activeProfileIndex ? ' active' : '') + (isMe ? ' is-me' : '');
                btn.textContent = p.name + (isMe ? ' (我)' : '');
                btn.onclick = () => { activeProfileIndex = idx; renderNotebook(); };
                tArea.appendChild(btn);
            });

            const addB = document.createElement('button');
            addB.className = 'tab-btn'; addB.style.background = "transparent"; addB.style.borderStyle = "dashed";
            addB.textContent = '＋ 新增別人';
            addB.onclick = () => openModal("👤 新增其他成員", "他的稱呼", "add_member");
            tArea.appendChild(addB);

            renderContentArea();
        }

        function renderPersonalPinnedSummary(profile) {
            // 收集此人所有釘選項目，按分類分組
            const grouped = {};
            profile.categories.forEach(cat => {
                const pinned = cat.items.filter(item => item.pinned);
                if (pinned.length > 0) {
                    grouped[cat.name] = pinned.map(p => p.text);
                }
            });

            if (Object.keys(grouped).length === 0) return '';

            const isMe = profile.id === myProfileId;
            const title = isMe ? '📌 我的重點摘要' : `📌 ${profile.name} 的重點摘要`;

            let html = `<div class="pinned-summary"><h4>${title}</h4>`;
            Object.entries(grouped).forEach(([catName, items]) => {
                html += `<div class="pinned-summary-row">
                    <span class="cat-label">${catName}：</span>
                    <span class="cat-items">${items.join('、')}</span>
                </div>`;
            });
            html += `</div>`;
            return html;
        }

        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
            renderContentArea();
        }

        function highlightText(text) {
            if (!searchQuery) return text;
            const regex = new RegExp(`(${searchQuery})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function renderContentArea() {
            const area = document.getElementById('contentArea');
            const actionArea = document.getElementById('actionButtons');
            area.innerHTML = '';
            actionArea.innerHTML = '';

            // 如果有搜尋字串，進入「全域搜尋模式」
            if (searchQuery) {
                const resultsArea = document.createElement('div');
                resultsArea.style.padding = '0 5px';

                let foundAny = false;
                const title = document.createElement('div');
                title.className = 'search-results-title';
                title.textContent = `🔍 全域搜尋結果： 『${searchQuery}』`;
                resultsArea.appendChild(title);

                // 搜尋個人資料
                localData.profiles.forEach(p => {
                    p.categories.forEach(cat => {
                        const items = cat.items.filter(i => i.text.toLowerCase().includes(searchQuery) || cat.name.toLowerCase().includes(searchQuery));
                        items.forEach(item => {
                            foundAny = true;
                            const div = document.createElement('div');
                            div.className = 'result-item';
                            div.innerHTML = `
                                <div class="meta"><span class="path">${p.name} > ${cat.name}</span></div>
                                <div style="font-size: 15px;">${highlightText(item.text)}</div>
                            `;
                            resultsArea.appendChild(div);
                        });
                    });
                });

                // 搜尋共同資料
                ensureSharedData();
                localData.shared.categories.forEach(cat => {
                    const items = cat.items.filter(i => i.text.toLowerCase().includes(searchQuery) || cat.name.toLowerCase().includes(searchQuery));
                    items.forEach(item => {
                        foundAny = true;
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `
                            <div class="meta"><span class="path">🌟 共同 > ${cat.name}</span></div>
                            <div style="font-size: 15px;">${highlightText(item.text)}</div>
                        `;
                        resultsArea.appendChild(div);
                    });
                });

                if (!foundAny) {
                    resultsArea.innerHTML = `<div style="text-align:center; padding:50px; color:#AAA;">找不到相關紀錄... 試試別的關鍵字？</div>`;
                }
                area.appendChild(resultsArea);
                return;
            }

            // === 共同 Tab ===
            if (activeProfileIndex === -1) {
                ensureSharedData();
                const banner = document.createElement('div');
                banner.className = 'shared-header-banner';
                banner.innerHTML = '🌟 這裡紀錄<b>大家共有的事物</b>，每個人都可以編輯！';
                area.appendChild(banner);

                const masonryDiv = document.createElement('div');
                masonryDiv.className = 'masonry';

                localData.shared.categories.forEach((cat, cIdx) => {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    let html = `
                    <div class="category-header">
                        <h3>📁 ${cat.name}</h3>
                        <span style="color:#CCC; cursor:pointer;" onclick="delSharedCategory(${cIdx})">✕</span>
                    </div>
                    <div class="item-list">`;

                    cat.items.forEach((item, iIdx) => {
                        html += `
                            <div class="item-tag">
                                <span>${item.text}</span>
                                <div class="tag-actions">
                                    <span class="action-btn" style="color:red;" onclick="delSharedItem(${cIdx}, ${iIdx})">✕</span>
                                </div>
                            </div>`;
                    });

                    html += `</div>
                        <div class="add-box">
                            <input type="text" id="sipt_${cIdx}" placeholder="新增項目..." onkeydown="if(event.key==='Enter') pushSharedItem(${cIdx})">
                            <button onclick="pushSharedItem(${cIdx})">加入</button>
                        </div>`;
                    card.innerHTML = html;
                    masonryDiv.appendChild(card);
                });
                area.appendChild(masonryDiv);

                // 共同頁底部按鈕
                actionArea.innerHTML = `
                    <button style="width:100%; padding:15px; background:transparent; border:2px dashed #FFB300; color:#B37D00; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px;"
                        onclick="openModal('📁 建立新共同分類', '例如: 家庭旅行計畫', 'shared_category')">
                        ＋ 新增共同分類
                    </button>`;
                return;
            }

            // === 個人 Tab ===
            if (localData.profiles.length === 0) return;
            const profile = localData.profiles[activeProfileIndex];
            if (!profile) return;

            const isMe = profile.id === myProfileId;

            // 個人釘選摘要卡
            const summaryHtml = renderPersonalPinnedSummary(profile);
            if (summaryHtml) {
                area.insertAdjacentHTML('beforeend', summaryHtml);
            }

            const masonryDiv = document.createElement('div');
            masonryDiv.className = 'masonry';

            profile.categories.forEach((cat, cIdx) => {
                const card = document.createElement('div');
                card.className = 'category-card';

                let html = `
                <div class="category-header">
                    <h3>📁 ${cat.name}</h3>
                    <span style="color:#CCC; cursor:pointer;" onclick="delCategory(${cIdx})">✕</span>
                </div>
                <div class="item-list">`;

                cat.items.forEach((item, iIdx) => {
                    const pinClass = item.pinned ? 'pinned' : '';
                    const pinIcon = item.pinned ? '📍' : '📌';
                    html += `
                        <div class="item-tag ${pinClass}">
                            <span>${item.text}</span>
                            <div class="tag-actions">
                                <span class="action-btn" onclick="togglePin(${cIdx}, ${iIdx})" title="釘選/解釘">${pinIcon}</span>
                                <span class="action-btn" style="color:red;" onclick="delItem(${cIdx}, ${iIdx})">✕</span>
                            </div>
                        </div>`;
                });

                html += `</div>
                    <div class="add-box">
                        <input type="text" id="ipt_${cIdx}" placeholder="新增項目..." onkeydown="if(event.key==='Enter') pushItem(${cIdx})">
                        <button onclick="pushItem(${cIdx})">加入</button>
                    </div>`;

                card.innerHTML = html;
                masonryDiv.appendChild(card);
            });
            area.appendChild(masonryDiv);

            // 個人頁底部按鈕：動態判斷「我」或「他」
            const meLabel = isMe ? '我' : '他';
            actionArea.innerHTML = `
                <button
                    style="width:100%; padding:15px; background:transparent; border:2px dashed #CCC; color:#888; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:20px;"
                    onclick="openModal('📁 建立新分類', '例如: 手搖杯喜好', 'category')">
                    ＋ 為${meLabel}建立新分類板塊
                </button>
                <button
                    style="width:100%; text-align:center; background:none; border:none; color:#CCC; margin-top:30px; cursor:pointer;"
                    onclick="delProfile()">⛔ 刪除此成員紀錄</button>`;
        }

        /* 資料操作 */
        window.pushItem = function (cIdx) {
            const ipt = document.getElementById('ipt_' + cIdx);
            if (!ipt.value.trim()) return;
            localData.profiles[activeProfileIndex].categories[cIdx].items.push({
                id: 'i_' + Date.now(),
                text: ipt.value.trim(),
                pinned: false
            });
            ipt.value = '';
            pushSync();
        };

        window.delItem = function (cIdx, iIdx) {
            localData.profiles[activeProfileIndex].categories[cIdx].items.splice(iIdx, 1);
            pushSync();
        };

        window.togglePin = function (cIdx, iIdx) {
            const it = localData.profiles[activeProfileIndex].categories[cIdx].items[iIdx];
            it.pinned = !it.pinned;
            pushSync();
        };

        window.delCategory = function (cIdx) {
            if (confirm("確定刪除此分類？")) {
                localData.profiles[activeProfileIndex].categories.splice(cIdx, 1);
                pushSync();
            }
        }

        window.delProfile = function () {
            if (confirm("確定刪除這位成員嗎？")) {
                localData.profiles.splice(activeProfileIndex, 1);
                activeProfileIndex = 0;
                pushSync();
            }
        }

        /* 共同 Tab 資料操作 */
        window.pushSharedItem = function (cIdx) {
            const ipt = document.getElementById('sipt_' + cIdx);
            if (!ipt.value.trim()) return;
            ensureSharedData();
            localData.shared.categories[cIdx].items.push({
                id: 'si_' + Date.now(),
                text: ipt.value.trim()
            });
            ipt.value = '';
            pushSync();
        };

        window.delSharedItem = function (cIdx, iIdx) {
            ensureSharedData();
            localData.shared.categories[cIdx].items.splice(iIdx, 1);
            pushSync();
        };

        window.delSharedCategory = function (cIdx) {
            if (confirm("確定刪除此共同分類？")) {
                ensureSharedData();
                localData.shared.categories.splice(cIdx, 1);
                pushSync();
            }
        };

        /* Modal 邏輯 */
        function openModal(title, placeholder, action) {
            document.getElementById('modalTitle').textContent = title;
            const i = document.getElementById('modalInput');
            i.placeholder = placeholder;
            i.value = '';
            modalAction = action;
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => i.focus(), 100);
            i.onkeydown = (e) => { if (e.key === 'Enter') exeModal(); };
            document.getElementById('modalConfirm').onclick = exeModal;
        }

        function exeModal() {
            const val = document.getElementById('modalInput').value.trim();
            if (!val) return;

            if (modalAction === 'create_room') {
                const uuid = 'room_' + Math.random().toString(36).substr(2, 9);
                // 寫入初步群組名稱資料與清空框架
                const newRoomData = { name: val, updatedAt: Date.now(), profiles: [] };
                localStorage.setItem('r_data_' + uuid, JSON.stringify(newRoomData));

                savedRooms.unshift({ id: uuid, name: val });
                saveRoomsList();
                window.location.href = '?room=' + uuid;
            }
            else if (modalAction === 'add_member') {
                localData.profiles.push({
                    id: 'p_' + Date.now(), name: val, categories: [
                        { id: 'c_1', name: '❤️ 喜歡', items: [] }, { id: 'c_2', name: '⚠️ 地雷', items: [] }
                    ]
                });
                activeProfileIndex = localData.profiles.length - 1;
                pushSync();
            }
            else if (modalAction === 'category') {
                localData.profiles[activeProfileIndex].categories.push({
                    id: 'c_' + Date.now(), name: val, items: []
                });
                pushSync();
            }
            else if (modalAction === 'shared_category') {
                ensureSharedData();
                localData.shared.categories.push({
                    id: 'sc_' + Date.now(), name: val, items: []
                });
                pushSync();
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        initApp();
    </script>
</body>

</html>

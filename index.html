<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>求生聯絡簿 📒 | 家人與伴侶共編版</title>
    <!-- MQTT 進行無伺服器即時同步 -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --pink: #FF6B8B;
            --bg: #FAFAFA;
            --border: #E5E5E5;
            --card: #FFFFFF;
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-view {
            text-align: center;
            max-width: 400px;
            padding: 50px 20px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-top: 50px;
        }

        .welcome-view h1 {
            color: var(--pink);
            margin-bottom: 20px;
        }

        .welcome-view p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-main {
            background: var(--pink);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 107, 139, 0.3);
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .identity-view {
            display: none;
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 30px;
            text-align: center;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border);
            margin-top: 50px;
        }

        .identity-view h2 {
            color: var(--pink);
            margin-bottom: 20px;
            font-size: 22px;
        }

        .id-btn {
            background: #FFF0F3;
            color: #A03B52;
            border: 1px solid #FFE0E6;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            font-size: 16px;
            transition: 0.2s;
            width: 100%;
        }

        .id-btn:hover {
            background: var(--pink);
            color: #FFF;
        }

        .or-text {
            margin: 20px 0;
            color: #AAA;
            font-size: 14px;
            position: relative;
            width: 100%;
        }

        .or-text::before,
        .or-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #EEE;
        }

        .or-text::before {
            left: 0;
        }

        .or-text::after {
            right: 0;
        }

        .create-id-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .create-id-box input {
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            text-align: center;
        }

        .create-id-box button {
            background: #E5E5E5;
            color: #555;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .create-id-box button:hover {
            background: var(--pink);
            color: white;
        }

        .loader-view {
            display: none;
            margin-top: 100px;
            font-weight: bold;
            color: #888;
            font-size: 18px;
        }

        .app-view {
            display: none;
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            min-height: 600px;
            position: relative;
            border: 1px solid var(--border);
        }

        .header {
            background: #FFF9FA;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            color: var(--pink);
            font-size: 20px;
        }

        .sync-status {
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .btn-share {
            background: #FFF;
            border: 1px solid var(--pink);
            color: var(--pink);
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            background: #FAFAFA;
            border-bottom: 1px solid var(--border);
            gap: 10px;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: #FFF;
            border: 1px solid #DDD;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .tab-btn.active {
            background: var(--pink);
            color: #FFF;
            border-color: var(--pink);
        }

        .tab-btn-add {
            background: transparent;
            border: 1px dashed #CCC;
            color: #888;
        }

        .content-area {
            padding: 20px;
            background: var(--card);
            min-height: 400px;
        }

        .empty-state {
            text-align: center;
            color: #AAA;
            padding: 50px 20px;
            font-size: 14px;
        }

        .category-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            background: #FCFCFC;
            position: relative;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed #CCC;
            padding-bottom: 10px;
        }

        .category-header h3 {
            font-size: 16px;
            color: #444;
        }

        .del-cat {
            font-size: 18px;
            color: #CCC;
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
        }

        .del-cat:hover {
            color: red;
        }

        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .item-tag {
            background: #FFF0F3;
            color: #A03B52;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #FFE0E6;
        }

        .item-tag .del-item {
            font-size: 12px;
            cursor: pointer;
            opacity: 0.6;
        }

        .item-tag .del-item:hover {
            opacity: 1;
            color: red;
        }

        .add-item-box {
            display: flex;
            gap: 10px;
        }

        .add-item-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #DDD;
            border-radius: 8px;
            outline: none;
        }

        .add-item-box button {
            background: #E5E5E5;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #555;
        }

        .add-item-box button:hover {
            background: var(--pink);
            color: white;
        }

        .add-cat-btn {
            width: 100%;
            border: 2px dashed #CCC;
            background: transparent;
            color: #888;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        .add-cat-btn:hover {
            border-color: var(--pink);
            color: var(--pink);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDD;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 16px;
            outline: none;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-cancel {
            background: #EEE;
            color: #555;
        }

        .btn-confirm {
            background: var(--pink);
            color: white;
        }
    </style>
</head>

<body>

    <!-- Welcome View -->
    <div class="welcome-view" id="welcomeView">
        <h1>📒 求生聯絡簿 V2</h1>
        <p>這是一個沒有伺服器限制、純靠魔法(加密連線)同步的小本本。<br><br>你可以建立一個專屬房間，把這個網址丟給你的家人、伴侶，大家點開網址就能<b>共同自訂標籤</b>、<b>即時新增彼此的喜好與地雷</b>。
        </p>
        <button class="btn-main" onclick="createRoom()">🏠 建立家庭共編空間</button>
    </div>

    <!-- Loader View -->
    <div class="loader-view" id="loaderView">
        🔄 正在同步家庭紀錄...
    </div>

    <!-- Identity View -->
    <div class="identity-view" id="identityView">
        <h2>這是你的專屬聯絡簿</h2>
        <p style="color: #666; font-size:14px; margin-bottom: 20px;">請選擇你是誰，或是建立一個自己的新身分：</p>
        <div id="existingProfiles" style="width: 100%; display: flex; flex-direction: column; gap: 10px;"></div>
        <div class="or-text" id="orTextId">或是</div>
        <div class="create-id-box">
            <input type="text" id="newIdentityName" placeholder="我是... (例如: 老婆、爸爸)">
            <button onclick="createNewIdentity()">我要建立新身分</button>
        </div>
    </div>

    <!-- Main App View -->
    <div class="app-view" id="appView">
        <div class="header">
            <div>
                <h2>📒 求生小本本</h2>
                <div class="sync-status"><span class="sync-dot" id="syncDot"></span> <span id="syncText">已即時連線</span>
                </div>
            </div>
            <button class="btn-share" onclick="shareRoom()">🔗 複製共編連結</button>
        </div>

        <!-- 頂部頁籤 (人物) -->
        <div class="tabs" id="tabsArea">
            <!-- 動態產生 -->
        </div>

        <!-- 內容區 (喜好清單) -->
        <div class="content-area" id="contentArea">
            <!-- 動態產生 -->
        </div>
    </div>

    <!-- Modal 彈窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">新增資料</h3>
            <input type="text" id="modalInput" placeholder="請輸入...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" id="modalConfirm">確定</button>
            </div>
        </div>
    </div>

    <script>
        /* =====================
           1. 系統與同步設定
           ===================== */
        // 使用 EMQX 公共 MQTT Broker 進行即時轉發
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
        let client = null;
        let roomID = new URLSearchParams(window.location.search).get('room');
        let localData = { updatedAt: 0, profiles: [] };
        let activeProfileIndex = 0;
        let myProfileId = roomID ? sessionStorage.getItem('my_identity_' + roomID) : null;

        // 用來區分是不是自己發送的訊息
        const myClientID = 'client_' + Math.random().toString(16).substr(2, 8);
        const topicSync = 'collab_notebook_v4_' + roomID;
        const topicReq = 'collab_notebook_req_' + roomID;

        // 檢查 URL 狀態
        if (roomID) {
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('loaderView').style.display = 'block';
            initMqttSync();
        }

        function createRoom() {
            const uuid = 'room_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
            window.location.href = '?room=' + uuid;
        }

        function initMqttSync() {
            const loadBackup = localStorage.getItem('collab_book_' + roomID);
            if (loadBackup) {
                localData = JSON.parse(loadBackup);
            }

            // 顯示目前連線狀態為連線中
            document.getElementById('syncText').textContent = '連線中...';
            document.getElementById('syncDot').style.background = '#FF9800';

            client = mqtt.connect(brokerUrl, {
                clientId: myClientID,
                clean: true,
                connectTimeout: 4000,
                reconnectPeriod: 1000,
            });

            client.on('connect', () => {
                document.getElementById('syncText').textContent = '已即時連線';
                document.getElementById('syncDot').style.background = '#4CAF50';

                // 訂閱資料更新頻道與請求頻道
                client.subscribe(topicSync);
                client.subscribe(topicReq);

                // 一連線就跟房間裡的人要最新資料
                client.publish(topicReq, "give_me_data");
            });

            client.on('message', (topic, message) => {
                if (topic === topicReq) {
                    // 有新用戶請求資料，且我們有資料時，廣播目前資料
                    if (message.toString() === "give_me_data" && localData.updatedAt > 0) {
                        client.publish(topicSync, JSON.stringify({ sender: myClientID, data: localData }));
                    }
                } else if (topic === topicSync) {
                    try {
                        const payload = JSON.parse(message.toString());
                        // 不要處理自己剛發出去的資料，避免無限迴圈
                        if (payload.sender === myClientID) return;

                        const serverData = payload.data;
                        // 如果伺服器的時間戳大於本地的，則覆蓋本地，並重新渲染UI
                        if (serverData.updatedAt > localData.updatedAt) {
                            localData = serverData;
                            localStorage.setItem('collab_book_' + roomID, JSON.stringify(localData));
                            if (document.getElementById('identityView').style.display === 'flex') {
                                renderIdentityChoices();
                            } else if (document.getElementById('appView').style.display === 'block') {
                                render();
                                triggerSyncAnim();
                            }
                        }
                    } catch (e) { console.error('Data parsing error', e); }
                }
            });

            // 等待一點時間抓取網路資料後，顯示身分選擇或主畫面
            setTimeout(() => {
                document.getElementById('loaderView').style.display = 'none';
                if (myProfileId && localData.profiles.find(p => p.id === myProfileId)) {
                    document.getElementById('appView').style.display = 'block';
                    activeProfileIndex = localData.profiles.findIndex(p => p.id === myProfileId);
                    if (activeProfileIndex === -1) activeProfileIndex = 0;
                    render();
                } else {
                    showIdentitySelection();
                }
            }, 1000);
        }

        // 發送資料變更到全網
        function pushSync() {
            localData.updatedAt = Date.now();
            localStorage.setItem('collab_book_' + roomID, JSON.stringify(localData));
            if (client && client.connected) {
                // 發布更新，讓所有訂閱者看到
                client.publish(topicSync, JSON.stringify({ sender: myClientID, data: localData }), { retain: true });
                triggerSyncAnim();
            }
            render();
        }

        function showIdentitySelection() {
            document.getElementById('appView').style.display = 'none';
            document.getElementById('identityView').style.display = 'flex';
            renderIdentityChoices();
        }

        function renderIdentityChoices() {
            const container = document.getElementById('existingProfiles');
            container.innerHTML = '';
            if (localData.profiles.length === 0) {
                document.getElementById('orTextId').style.display = 'none';
                return;
            }
            document.getElementById('orTextId').style.display = 'block';
            localData.profiles.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'id-btn';
                btn.textContent = '我是 ' + p.name;
                btn.onclick = () => { selectIdentity(p.id); };
                container.appendChild(btn);
            });
        }

        function selectIdentity(pid) {
            myProfileId = pid;
            sessionStorage.setItem('my_identity_' + roomID, pid);
            document.getElementById('identityView').style.display = 'none';
            document.getElementById('appView').style.display = 'block';
            activeProfileIndex = localData.profiles.findIndex(p => p.id === pid);
            if (activeProfileIndex === -1) activeProfileIndex = 0;
            render();
        }

        function createNewIdentity() {
            const name = document.getElementById('newIdentityName').value.trim();
            if (!name) return alert('請輸入您的名稱！');

            const newPid = 'p_' + Date.now();
            localData.profiles.push({
                id: newPid,
                name: name,
                categories: [
                    { id: 'c_like', name: '❤️ 喜歡的東西', items: [] },
                    { id: 'c_hate', name: '⚠️ 絕對地雷', items: [] }
                ]
            });
            pushSync();
            selectIdentity(newPid);
        }

        function triggerSyncAnim() {
            const dot = document.getElementById('syncDot');
            dot.style.background = '#2196F3'; // 變為藍色代表同步中
            setTimeout(() => dot.style.background = '#4CAF50', 500); // 變回綠色
        }

        /* =====================
           2. UI 渲染實作
           ===================== */
        function render() {
            renderTabs();
            renderContent();
        }

        function renderTabs() {
            const tabsArea = document.getElementById('tabsArea');
            tabsArea.innerHTML = '';

            if (localData.profiles.length > 0 && activeProfileIndex >= localData.profiles.length) {
                activeProfileIndex = 0;
            }

            localData.profiles.forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (idx === activeProfileIndex ? ' active' : '');
                btn.textContent = p.name;
                btn.onclick = () => { activeProfileIndex = idx; render(); };
                tabsArea.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'tab-btn tab-btn-add';
            addBtn.textContent = '＋ 新增此家庭成員';
            addBtn.onclick = () => openModal('👤 建立家庭新成員身分', '例如：老婆、兒子、小美', (val) => addProfile(val));
            tabsArea.appendChild(addBtn);
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';

            if (localData.profiles.length === 0) {
                area.innerHTML = '<div class="empty-state">尚無成員，請先新增家庭成員。</div>';
                return;
            }

            const profile = localData.profiles[activeProfileIndex];

            // 分類清單
            profile.categories.forEach((cat, cIdx) => {
                const card = document.createElement('div');
                card.className = 'category-card';

                // 卡片標頭
                let html = `
                <div class="category-header">
                    <h3>📁 ${cat.name}</h3>
                    <button class="del-cat" onclick="delCategory(${cIdx})">✕</button>
                </div>
                <div class="item-list">
            `;

                // 項目標籤
                cat.items.forEach((item, iIdx) => {
                    html += `
                    <div class="item-tag">
                        <span>${item}</span>
                        <span class="del-item" onclick="delItem(${cIdx}, ${iIdx})">✕</span>
                    </div>
                `;
                });
                html += `</div>`;

                // 新增項目輸入框
                html += `
                <div class="add-item-box">
                    <input type="text" id="ipt_${cIdx}" placeholder="新增${cat.name}的項目" onkeydown="if(event.key==='Enter') pushItem(${cIdx})">
                    <button onclick="pushItem(${cIdx})">加入</button>
                </div>
            `;

                card.innerHTML = html;
                area.appendChild(card);
            });

            // 最底部的「新增自訂分類」按鈕
            const addCatBtn = document.createElement('button');
            addCatBtn.className = 'add-cat-btn';
            addCatBtn.textContent = '＋ 建立新分類 (例如：飲料喜好、地雷禁區、鞋子尺寸)';
            addCatBtn.onclick = () => openModal('📁 建立他的專屬新分類標籤', '例如：愛吃的東西', (val) => addCategory(val));

            // 若該成員有資料，加入刪除成員的選項
            const delMemberBtn = document.createElement('button');
            delMemberBtn.textContent = '⛔ 刪除此成員所有紀錄';
            delMemberBtn.style = 'background: transparent; border: none; color: #CCC; font-size:12px; cursor: pointer; text-decoration: underline; display: block; text-align: center; width: 100%; margin-top: 25px;';
            delMemberBtn.onclick = () => delProfile(activeProfileIndex);

            area.appendChild(addCatBtn);
            area.appendChild(delMemberBtn);
        }

        /* =====================
           3. 資料操作邏輯
           ===================== */
        function addProfile(name) {
            if (!name.trim()) return;
            localData.profiles.push({
                id: 'p_' + Date.now(),
                name: name.trim(),
                categories: [
                    { id: 'c_like', name: '❤️ 喜歡的東西', items: [] },
                    { id: 'c_hate', name: '⚠️ 絕對地雷', items: [] }
                ]
            });
            activeProfileIndex = localData.profiles.length - 1;
            pushSync();
        }

        function delProfile(pIdx) {
            if (confirm('確定要刪除整個成員紀錄嗎？(擁有連結的其他人也會同步被刪除喔)')) {
                localData.profiles.splice(pIdx, 1);
                activeProfileIndex = 0;
                pushSync();
            }
        }

        function addCategory(name) {
            if (!name.trim()) return;
            const profile = localData.profiles[activeProfileIndex];
            profile.categories.push({
                id: 'c_' + Date.now(),
                name: name.trim(),
                items: []
            });
            pushSync();
        }

        function delCategory(cIdx) {
            if (confirm('確定刪除此分類？')) {
                localData.profiles[activeProfileIndex].categories.splice(cIdx, 1);
                pushSync();
            }
        }

        window.pushItem = function (cIdx) {
            const ipt = document.getElementById('ipt_' + cIdx);
            const val = ipt.value.trim();
            if (!val) return;
            localData.profiles[activeProfileIndex].categories[cIdx].items.push(val);
            pushSync();
        };

        window.delItem = function (cIdx, iIdx) {
            localData.profiles[activeProfileIndex].categories[cIdx].items.splice(iIdx, 1);
            pushSync();
        };

        function shareRoom() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('🔗 已複製您的共同編輯專屬連結！\n\n只要將連結傳給你的家人或伴侶，他們用手機打開，就能看見並且「即時同步」編輯彼此的紀錄！');
            });
        }

        /* =====================
           4. Modal 彈窗小工具
           ===================== */
        let modalCallback = null;
        function openModal(title, placeholder, callback) {
            document.getElementById('modalTitle').textContent = title;
            const ipt = document.getElementById('modalInput');
            ipt.placeholder = placeholder;
            ipt.value = '';
            modalCallback = callback;
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => ipt.focus(), 100);

            // 綁定鍵盤送出
            ipt.onkeydown = (e) => { if (e.key === 'Enter') confirmModal(); };

            document.getElementById('modalConfirm').onclick = confirmModal;
        }

        function confirmModal() {
            const val = document.getElementById('modalInput').value;
            if (modalCallback) modalCallback(val);
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            modalCallback = null;
        }
    </script>
</body>

</html>
